services:
  openldap:
    image: bitnamilegacy/openldap:2.6.10-debian-12-r4
    ports:
      - "1389:1389"
      - "1636:1636"
    environment:
      LDAP_ROOT: "dc=example,dc=org"
      LDAP_ADMIN_USERNAME: "admin"
      LDAP_ADMIN_PASSWORD: "adminpassword"
      LDAP_PORT_NUMBER: "1389"
      LDAP_LDAPS_PORT_NUMBER: "1636"
      LDAP_ENABLE_TLS: "yes"
      LDAP_TLS_CERT_FILE: "/opt/bitnami/openldap/certs/server.crt"
      LDAP_TLS_KEY_FILE: "/opt/bitnami/openldap/certs/server.key"
      LDAP_TLS_CA_FILE: "/opt/bitnami/openldap/certs/ca.crt"
      LDAP_CUSTOM_LDIF_DIR: "/ldifs"
    volumes:
      - ".certs/server.crt:/opt/bitnami/openldap/certs/server.crt:ro"
      - ".certs/server.key:/opt/bitnami/openldap/certs/server.key:ro"
      - ".certs/ca.crt:/opt/bitnami/openldap/certs/ca.crt:ro"
      - "./Tests/IntegrationTests/Fixtures:/ldifs:ro"
    healthcheck:
      test:
        [
          "CMD",
          "ldapsearch",
          "-x",
          "-H",
          "ldap://localhost:1389",
          "-b",
          "dc=example,dc=org",
          "-D",
          "cn=admin,dc=example,dc=org",
          "-w",
          "adminpassword",
        ]
      interval: 5s
      timeout: 10s
      retries: 10
